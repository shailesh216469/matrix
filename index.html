<!DOCTYPE html>
<html>
<head>
    <title>MatrixGram Elite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #fafafa; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .nav { background: white; border-bottom: 1px solid #dbdbdb; width: 100%; padding: 10px; text-align: center; position: sticky; top: 0; }
        .feed { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .post { background: white; border: 1px solid #dbdbdb; margin-bottom: 20px; padding: 15px; border-radius: 8px; }
        .input-area { background: white; border: 1px solid #dbdbdb; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, button, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #dbdbdb; border-radius: 5px; box-sizing: border-box; }
        button { background: #0095f6; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav"><b>MatrixGram Elite</b></div>

<div class="feed" id="main">
    <div id="login-box" class="post">
        <input type="text" id="user" placeholder="Choose a Username">
        <button onclick="startApp()">Join Feed</button>
    </div>

    <div id="app-box" style="display:none;">
        <div class="input-area">
            <textarea id="msg" placeholder="What's happening?"></textarea>
            <button onclick="post()">Share</button>
        </div>
        <div id="posts">Loading...</div>
    </div>
</div>

<script>
    // Your actual Vercel URL
    const SHIELD = "https://matrix-one-kappa.vercel.app/api/shield";

    function startApp() {
        const u = document.getElementById('user').value;
        if(!u) return alert("Enter username");
        localStorage.setItem('mg_user', u);
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('app-box').style.display = 'block';
        load();
    }

    async function load() {
        try {
            const r = await fetch(SHIELD);
            const d = await r.json();
            if(d.error) throw new Error(d.details);
            document.getElementById('posts').innerHTML = d.feed.map(p => `
                <div class="post"><b>@${p.user}</b><br>${p.text}</div>
            `).join('');
        } catch(e) { 
            document.getElementById('posts').innerHTML = "Error: " + e.message;
        }
    }

    async function post() {
        const m = document.getElementById('msg').value;
        if(!m) return;
        
        await fetch(SHIELD, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                username: localStorage.getItem('mg_user'), 
                message: m, 
                isSystem: false 
            })
        });
        document.getElementById('msg').value = '';
        load();
    }
</script>
</body>
</html>
