<!DOCTYPE html>
<html>
<head>
    <title>MatrixGram Elite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .post { background: white; border: 1px solid #dbdbdb; padding: 15px; margin: 10px; width: 90%; max-width: 400px; border-radius: 8px; }
        button { background: #0095f6; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        textarea { width: 100%; padding: 10px; border: 1px solid #dbdbdb; border-radius: 5px; box-sizing: border-box; }
        #error-msg { color: red; font-size: 12px; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <h3>MatrixGram Elite</h3>
    <div id="error-msg"></div>

    <div id="login" class="post">
        <input type="text" id="user" placeholder="Enter Username" style="width:100%; padding:8px;">
        <button onclick="enter()" style="margin-top:10px;">Login</button>
    </div>

    <div id="app" style="display:none; width:100%; max-width:400px;">
        <div class="post">
            <textarea id="msg" placeholder="What's happening?"></textarea>
            <button onclick="send()" style="margin-top:10px;">Share</button>
        </div>
        <div id="feed"></div>
    </div>

<script>
    const SHIELD = "https://matrix-one-kappa.vercel.app/api/shield";

    function showError(m) { document.getElementById('error-msg').innerText = "Status: " + m; }

    function enter() {
        const u = document.getElementById('user').value;
        if(!u) return;
        localStorage.setItem('mg_user', u);
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        load();
    }

    async function load() {
        try {
            const r = await fetch(SHIELD);
            const d = await r.json();
            if (d.error) return showError(d.details);
            document.getElementById('feed').innerHTML = d.feed.map(p => `
                <div class="post"><b>@${p.user}</b><br>${p.text}</div>
            `).join('');
            showError("Connected");
        } catch(e) { showError("Vercel Offline or URL Wrong"); }
    }

    async function send() {
        const m = document.getElementById('msg').value;
        if(!m) return;
        try {
            const res = await fetch(SHIELD, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: localStorage.getItem('mg_user'), message: m })
            });
            const data = await res.json();
            if(data.error) return alert("Post Failed: " + data.details);
            document.getElementById('msg').value = '';
            load();
        } catch(e) { 
            console.error(e);
            alert("Network Error"); 
        }
    }
</script>
</body>
</html>
